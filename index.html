<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f5eff">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>

  :root{
    --bg: #f5f6f8;
    --panel: #ffffff;
    --panel-border: #e7e9ee;
    --text: #14161a;
    --text-dim: #6b7280;
    --accent: #2f5eff;
    --accent-dim: #eef1ff;
    --danger: #e5484d;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(20,22,26,0.04), 0 8px 24px -12px rgba(20,22,26,0.12);
    --sidebar-w: 250px;
  }
  [data-theme="dark"]{
    --bg: #0e0f13;
    --panel: #1b1d24;
    --panel-border: #343742;
    --text: #f3f4f6;
    --text-dim: #a7abb5;
    --accent: #7c96ff;
    --accent-dim: #232a4d;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px -12px rgba(0,0,0,0.5);
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background .25s ease, color .25s ease;
  }
  a{ color: inherit; text-decoration: none; }
  button{ font-family: inherit; cursor:pointer; }

  .app{ display:flex; min-height:100vh; }

  .sidebar{
    width: var(--sidebar-w);
    flex-shrink:0;
    background: var(--panel);
    border-right: 1px solid var(--panel-border);
    display:flex;
    flex-direction:column;
    position: sticky;
    top:0;
    height:100vh;
    padding: 18px 14px;
    transition: transform .25s ease, background .25s ease, border-color .25s ease;
    z-index: 40;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding: 6px 8px 18px 8px;
  }
  .brand-mark{
    width:30px; height:30px; border-radius:9px;
    background: linear-gradient(135deg, var(--accent), #7ea0ff);
    flex-shrink:0;
  }
  .brand-name{ font-weight:700; font-size:15px; letter-spacing:-0.01em; }

  .sidebar-scroll{ flex:1; overflow-y:auto; padding-right:2px; }
  .sidebar-scroll::-webkit-scrollbar{ width:6px; }
  .sidebar-scroll::-webkit-scrollbar-thumb{ background: var(--panel-border); border-radius:4px; }

  .nav-section-label{
    font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em;
    color: var(--text-dim); padding: 14px 10px 6px;
  }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 8px 10px; border-radius:9px;
    font-size:14px; font-weight:500; color: var(--text);
    cursor:pointer; border:none; background:none; width:100%; text-align:left;
    margin-bottom:2px;
  }
  .nav-item:hover{ background: var(--accent-dim); }
  .nav-item.active{ background: var(--accent-dim); color: var(--accent); }
  .nav-item .dot{
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
    background: var(--cat-color, var(--accent));
  }
  .nav-item .count{
    margin-left:auto; font-size:11px; color: var(--text-dim); font-weight:600;
  }
  .nav-item .drag-handle{
    cursor:grab; color: var(--text-dim); font-size:12px; flex-shrink:0; line-height:1;
  }
  .nav-item.dragging{ opacity:.4; }
  .nav-item.drag-over-top{ box-shadow: inset 0 2px 0 0 var(--accent); }
  .nav-item.drag-over-bottom{ box-shadow: inset 0 -2px 0 0 var(--accent); }
  .nav-add{
    display:flex; align-items:center; gap:8px;
    padding: 8px 10px; border-radius:9px; margin-top:4px;
    font-size:13px; font-weight:600; color: var(--text-dim);
    border: 1px dashed var(--panel-border); background:none; width:100%;
  }
  .nav-add:hover{ color: var(--accent); border-color: var(--accent); }

  .sidebar-footer{ border-top:1px solid var(--panel-border); padding-top:10px; margin-top:10px; display:flex; flex-direction:column; gap:2px; }

  .main{ flex:1; min-width:0; padding: 26px 34px 60px; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    margin-bottom: 26px; flex-wrap:wrap;
  }
  .clock-block{ display:flex; gap:22px; align-items:baseline; }
  .clock-date{ font-size:15px; color: var(--text-dim); font-weight:500; }
  .clock-time{ font-size:15px; font-weight:600; font-variant-numeric: tabular-nums; }
  .tz-select{
    font-size:12px; font-weight:600; color: var(--text);
    border:1px solid var(--panel-border); background: var(--panel);
    border-radius:8px; padding:6px 8px; outline:none; max-width:170px;
  }
  .tz-select:focus{ border-color: var(--accent); }

  .search-wrap{ position:relative; flex:1; max-width:380px; min-width:180px; }
  .search-input{
    width:100%; padding:10px 14px 10px 36px; border-radius:10px;
    border:1px solid var(--panel-border); background: var(--panel); color: var(--text);
    font-size:14px; outline:none;
  }
  .search-input:focus{ border-color: var(--accent); }
  .search-icon{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    font-size:14px; color: var(--text-dim); pointer-events:none;
  }

  .topbar-actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{
    width:36px; height:36px; border-radius:10px; border:1px solid var(--panel-border);
    background: var(--panel); display:flex; align-items:center; justify-content:center;
    font-size:15px;
  }
  .icon-btn:hover{ border-color: var(--accent); color: var(--accent); }
  .edit-toggle{
    display:flex; align-items:center; gap:8px;
    padding: 8px 14px; border-radius:10px; border:1.5px solid var(--accent);
    background: var(--accent-dim); color: var(--accent); font-size:13px; font-weight:700;
  }
  .edit-toggle.on{ background: var(--accent); color:#fff; border-color: var(--accent); }

  .menu-toggle{ display:none; }

  .category-block{ margin-bottom: 34px; scroll-margin-top: 20px; }
  .category-head{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .category-title{ font-size:17px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .category-title .dot{ width:9px; height:9px; border-radius:50%; background: var(--cat-color, var(--accent)); }
  .category-actions{ display:none; gap:4px; margin-left:auto; }
  .category-block.editing .category-actions{ display:flex; }
  .mini-btn{
    width:26px; height:26px; border-radius:7px; border:1px solid var(--panel-border);
    background: var(--panel); font-size:12px; display:flex; align-items:center; justify-content:center;
  }
  .mini-btn:hover{ border-color: var(--accent); color:var(--accent); }
  .mini-btn.danger:hover{ border-color: var(--danger); color: var(--danger); }

  .links-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .link-card{
    position:relative;
    display:flex; align-items:center; gap:10px;
    padding: 12px 12px; border-radius: 12px;
    background: var(--panel); border:1px solid var(--panel-border);
    box-shadow: var(--shadow);
    transition: transform .15s ease, border-color .15s ease;
    min-width:0;
  }
  .link-card:hover{ transform: translateY(-2px); border-color: var(--accent); }
  .link-favicon{ width:20px; height:20px; border-radius:5px; flex-shrink:0; background: var(--accent-dim); object-fit:cover; }
  .link-text{ min-width:0; }
  .link-title{ font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .link-url{ font-size:11px; color: var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .link-card-actions{ display:none; gap:4px; margin-left:auto; flex-shrink:0; }
  .category-block.editing .link-card-actions{ display:flex; }
  .category-block.editing .link-card{ padding-right:8px; }

  .empty-cat{ font-size:13px; color: var(--text-dim); font-style:italic; padding: 6px 2px; }

  .add-link-tile{
    display:none;
    align-items:center; justify-content:center;
    border-radius:12px; border:1.5px dashed var(--panel-border);
    color: var(--text-dim); font-size:13px; font-weight:600; min-height:46px;
    background:none;
  }
  .category-block.editing .add-link-tile{ display:flex; }
  .add-link-tile:hover{ border-color: var(--accent); color: var(--accent); }

  .add-category-tile{
    display:flex; align-items:center; justify-content:center; gap:8px;
    border-radius:14px; border:1.5px dashed var(--panel-border);
    padding: 16px; color: var(--text-dim); font-weight:600; font-size:14px;
    background:none; width:100%; margin-top: 10px;
  }
  .add-category-tile:hover{ border-color: var(--accent); color: var(--accent); }

  .modal-overlay{
    position:fixed; inset:0; background: rgba(10,10,14,0.4);
    display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background: var(--panel); border-radius:16px; width:100%; max-width:380px;
    padding: 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); border: 1px solid var(--panel-border);
  }
  .modal h3{ margin:0 0 16px; font-size:16px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:600; color: var(--text-dim); margin-bottom:6px; }
  .field input, .field select{
    width:100%; padding:9px 12px; border-radius:9px; border:1px solid var(--panel-border);
    background: var(--bg); color: var(--text); font-size:13.5px; outline:none;
  }
  .field input:focus, .field select:focus{ border-color: var(--accent); }
  .color-picker-row{ display:flex; gap:10px; align-items:center; }
  .color-picker-row input[type="color"]{
    width:42px; height:36px; padding:2px; border-radius:9px; border:1px solid var(--panel-border);
    background: var(--bg); cursor:pointer; flex-shrink:0;
  }
  .color-picker-row input[type="text"]{
    flex:1; padding:9px 12px; border-radius:9px; border:1px solid var(--panel-border);
    background: var(--bg); color: var(--text); font-size:13.5px; outline:none;
  }
  .color-picker-row input[type="text"]:focus{ border-color: var(--accent); }
  .color-error{ font-size:11.5px; color: var(--danger); margin-top:6px; min-height:14px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top: 18px; }
  .btn{
    padding: 9px 16px; border-radius:9px; border:1px solid var(--panel-border);
    background: var(--panel); font-size:13.5px; font-weight:600; color: var(--text);
  }
  .btn.primary{ background: var(--accent); border-color: var(--accent); color:#fff; }
  .btn:hover{ opacity:.88; }

  .toast{
    position:fixed; bottom:22px; left:50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--panel); padding:10px 18px; border-radius:10px;
    font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition: all .25s ease; z-index:200;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  .no-results{ color: var(--text-dim); font-size:14px; padding: 40px 0; text-align:center; }
  .empty-state{ text-align:center; padding: 60px 20px; }
  .empty-state-title{ font-size:18px; font-weight:700; margin-bottom:8px; }
  .empty-state-body{ font-size:14px; color: var(--text-dim); }

  @media (max-width: 860px){
    .sidebar{
      position:fixed; left:0; top:0; transform: translateX(-100%);
      box-shadow: 0 0 40px rgba(0,0,0,0.15);
    }
    .sidebar.open{ transform: translateX(0); }
    .menu-toggle{ display:flex; }
    .main{ padding: 18px 16px 60px; }
    .topbar{ gap:10px; }
    .clock-block{ order:3; width:100%; justify-content:space-between; }
  }
</style>
</head>
<body data-theme="light">
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Dashboard</div>
    </div>
    <div class="sidebar-scroll">
      <div class="nav-section-label">Categories</div>
      <div id="navList"></div>
      <button class="nav-add" id="navAddCategoryBtn">+ Add category</button>
    </div>
    <div class="sidebar-footer">
      <button class="nav-item" id="editModeToggleSidebar">🖉 <span>Edit mode</span></button>
      <button class="nav-item" id="darkModeToggle">🌙 <span>Dark mode</span></button>
      <button class="nav-item" id="exportBtn">⭳ <span>Export</span></button>
      <button class="nav-item" id="importBtn">⭱ <span>Import</span></button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle">☰</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Search links..." autocomplete="off">
      </div>
      <div class="clock-block">
        <span class="clock-date" id="clockDate"></span>
        <span class="clock-time" id="clockTime"></span>
        <select class="tz-select" id="tzSelect" title="Choose your timezone"></select>
      </div>
      <div class="topbar-actions">
        <button class="edit-toggle" id="editModeToggleTop">🖉 Edit mode</button>
      </div>
    </div>

    <div id="categoriesContainer"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-state-title">Your dashboard is empty</div>
      <div class="empty-state-body">Add a category to get started, then fill it with your own links.</div>
    </div>
    <div class="no-results" id="noResults" style="display:none;">No links match your search.</div>

    <button class="add-category-tile" id="addCategoryTileBtn">+ Add a new category</button>
  </main>
</div>

<div class="modal-overlay" id="categoryModalOverlay">
  <div class="modal">
    <h3 id="categoryModalTitle">Add category</h3>
    <div class="field">
      <label>Category name</label>
      <input type="text" id="categoryNameInput" placeholder="e.g. Games">
    </div>
    <div class="field">
      <label>Accent color</label>
      <div class="color-picker-row">
        <input type="color" id="categoryColorPicker" value="#2f5eff">
        <input type="text" id="categoryColorText" placeholder="#2f5eff or rgb(47,94,255)">
      </div>
      <div class="color-error" id="categoryColorError"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="categoryCancelBtn">Cancel</button>
      <button class="btn primary" id="categorySaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="linkModalOverlay">
  <div class="modal">
    <h3 id="linkModalTitle">Add link</h3>
    <div class="field">
      <label>Category</label>
      <select id="linkCategorySelect"></select>
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="linkTitleInput" placeholder="e.g. YouTube">
    </div>
    <div class="field">
      <label>URL</label>
      <input type="text" id="linkUrlInput" placeholder="https://www.youtube.com">
    </div>
    <div class="modal-actions">
      <button class="btn" id="linkCancelBtn">Cancel</button>
      <button class="btn primary" id="linkSaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="confirmModalOverlay">
  <div class="modal">
    <h3 id="confirmModalTitle">Are you sure?</h3>
    <p id="confirmModalBody" style="font-size:13.5px;color:var(--text-dim);margin:0 0 4px;"></p>
    <div class="modal-actions">
      <button class="btn" id="confirmCancelBtn">Cancel</button>
      <button class="btn primary" id="confirmOkBtn" style="background:var(--danger);border-color:var(--danger);">Delete</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "dashboard_data_v1";
  const THEME_KEY = "dashboard_theme_v1";
  const TIMEZONE_KEY = "dashboard_timezone_v1";

  const defaultData = {
    categories: []
  };

  let data = loadData();
  let editMode = false;
  let editingCategoryId = null;
  let editingLinkId = null; 
  let linkModalMode = "add"; 

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.categories)) return parsed;
      }
    }catch(e){ console.error("Failed to load dashboard data", e); }
    return JSON.parse(JSON.stringify(defaultData));
  }

  function saveData(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }catch(e){
      console.error("Failed to save dashboard data", e);
      showToast("Could not save — storage error");
    }
  }

  function uid(prefix){
    return prefix + "_" + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
  }

  function faviconFor(url){
    try{
      const u = new URL(url);
      return "https://www.google.com/s2/favicons?sz=64&domain=" + u.hostname;
    }catch(e){
      return "";
    }
  }

  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(()=> t.classList.remove("show"), 2000);
  }

  function render(){
    renderSidebar();
    renderCategories();
  }

  let draggedCategoryId = null;

  function renderSidebar(){
    const navList = document.getElementById("navList");
    navList.innerHTML = "";
    data.categories.forEach(cat=>{
      const btn = document.createElement("button");
      btn.className = "nav-item";
      btn.draggable = true;
      btn.dataset.catId = cat.id;
      btn.style.setProperty("--cat-color", cat.color || "#2f5eff");
      btn.innerHTML = `<span class="drag-handle" title="Drag to reorder">⠿</span><span class="dot"></span><span>${escapeHtml(cat.name)}</span><span class="count">${cat.links.length}</span>`;

      btn.addEventListener("click", (e)=>{
        if(draggedCategoryId) return; // ignore click right after a drag
        const el = document.getElementById("cat-" + cat.id);
        if(el){
          el.scrollIntoView({behavior:"smooth", block:"start"});
          closeMobileSidebar();
        }
      });

      btn.addEventListener("dragstart", (e)=>{
        draggedCategoryId = cat.id;
        btn.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", cat.id);
      });

      btn.addEventListener("dragend", ()=>{
        draggedCategoryId = null;
        navList.querySelectorAll(".nav-item").forEach(el=>{
          el.classList.remove("dragging","drag-over-top","drag-over-bottom");
        });
      });

      btn.addEventListener("dragover", (e)=>{
        e.preventDefault();
        if(!draggedCategoryId || draggedCategoryId === cat.id) return;
        const rect = btn.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        btn.classList.toggle("drag-over-top", before);
        btn.classList.toggle("drag-over-bottom", !before);
      });

      btn.addEventListener("dragleave", ()=>{
        btn.classList.remove("drag-over-top","drag-over-bottom");
      });

      btn.addEventListener("drop", (e)=>{
        e.preventDefault();
        btn.classList.remove("drag-over-top","drag-over-bottom");
        const sourceId = draggedCategoryId || e.dataTransfer.getData("text/plain");
        if(!sourceId || sourceId === cat.id) return;

        const rect = btn.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;

        const fromIndex = data.categories.findIndex(c=>c.id===sourceId);
        if(fromIndex === -1) return;
        const [moved] = data.categories.splice(fromIndex, 1);

        let toIndex = data.categories.findIndex(c=>c.id===cat.id);
        if(!before) toIndex += 1;
        data.categories.splice(toIndex, 0, moved);

        saveData();
        render();
        showToast(`Moved "${moved.name}"`);
      });

      navList.appendChild(btn);
    });
  }

  function renderCategories(filterText){
    const container = document.getElementById("categoriesContainer");
    container.innerHTML = "";
    const filter = (filterText || "").trim().toLowerCase();
    let anyVisible = false;

    data.categories.forEach(cat=>{
      const filteredLinks = filter
        ? cat.links.filter(l => l.title.toLowerCase().includes(filter) || l.url.toLowerCase().includes(filter))
        : cat.links;

      if(filter && filteredLinks.length === 0) return;
      anyVisible = true;

      const block = document.createElement("div");
      block.className = "category-block" + (editMode ? " editing" : "");
      block.id = "cat-" + cat.id;
      block.style.setProperty("--cat-color", cat.color || "#2f5eff");

      const head = document.createElement("div");
      head.className = "category-head";
      head.innerHTML = `
        <div class="category-title"><span class="dot"></span>${escapeHtml(cat.name)}</div>
        <div class="category-actions">
          <button class="mini-btn" data-action="edit-cat" data-id="${cat.id}" title="Rename category">✏️</button>
          <button class="mini-btn danger" data-action="delete-cat" data-id="${cat.id}" title="Delete category">🗑️</button>
        </div>
      `;
      block.appendChild(head);

      const grid = document.createElement("div");
      grid.className = "links-grid";

      if(filteredLinks.length === 0 && !filter){
        const empty = document.createElement("div");
        empty.className = "empty-cat";
        empty.textContent = "No links yet.";
        grid.appendChild(empty);
      }

      filteredLinks.forEach(link=>{
        const card = document.createElement("a");
        card.className = "link-card";
        card.href = link.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.innerHTML = `
          <img class="link-favicon" src="${faviconFor(link.url)}" alt="" onerror="this.style.visibility='hidden'">
          <div class="link-text">
            <div class="link-title">${escapeHtml(link.title)}</div>
            <div class="link-url">${escapeHtml(shortUrl(link.url))}</div>
          </div>
          <div class="link-card-actions">
            <button class="mini-btn" data-action="edit-link" data-cat="${cat.id}" data-id="${link.id}" title="Edit link">✏️</button>
            <button class="mini-btn danger" data-action="delete-link" data-cat="${cat.id}" data-id="${link.id}" title="Delete link">🗑️</button>
          </div>
        `;
        card.addEventListener("click", (e)=>{
          if(e.target.closest("[data-action]")) e.preventDefault();
        });
        grid.appendChild(card);
      });

      const addTile = document.createElement("button");
      addTile.className = "add-link-tile";
      addTile.textContent = "+ Add link";
      addTile.addEventListener("click", ()=> openLinkModal("add", cat.id));
      grid.appendChild(addTile);

      block.appendChild(grid);
      container.appendChild(block);
    });

    document.getElementById("noResults").style.display = (filter && !anyVisible) ? "block" : "none";
    document.getElementById("emptyState").style.display = (!filter && data.categories.length === 0) ? "block" : "none";

    container.querySelectorAll("[data-action]").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.preventDefault();
        e.stopPropagation();
        const action = btn.getAttribute("data-action");
        const id = btn.getAttribute("data-id");
        const catId = btn.getAttribute("data-cat");
        if(action === "edit-cat") openCategoryModal("edit", id);
        if(action === "delete-cat") deleteCategory(id);
        if(action === "edit-link") openLinkModal("edit", catId, id);
        if(action === "delete-link") deleteLink(catId, id);
      });
    });
  }

  function shortUrl(url){
    try{
      const u = new URL(url);
      return u.hostname.replace(/^www\./,"");
    }catch(e){ return url; }
  }

  function escapeHtml(str){
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  /* ---------- Category CRUD ---------- */

  function isValidHex(str){
    return /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(str.trim());
  }

  function isValidRgb(str){
    return /^rgb\(\s*\d{1,3}\s*,\s*\d{1,3}\s*,\s*\d{1,3}\s*\)$/i.test(str.trim());
  }

  function normalizeHex(str){
    str = str.trim();
    if(/^#([0-9a-f]{3})$/i.test(str)){
      return "#" + str.slice(1).split("").map(ch=>ch+ch).join("");
    }
    return str.toLowerCase();
  }

  function rgbStringToHex(str){
    const m = str.match(/rgb\(\s*(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})\s*\)/i);
    if(!m) return null;
    const [r,g,b] = [m[1],m[2],m[3]].map(n=> Math.min(255, parseInt(n,10)));
    return "#" + [r,g,b].map(n=> n.toString(16).padStart(2,"0")).join("");
  }

  function openCategoryModal(mode, catId){
    editingCategoryId = mode === "edit" ? catId : null;
    document.getElementById("categoryModalTitle").textContent = mode === "edit" ? "Rename category" : "Add category";
    const nameInput = document.getElementById("categoryNameInput");
    nameInput.value = mode === "edit" ? (data.categories.find(c=>c.id===catId)?.name || "") : "";

    const currentColor = (mode === "edit" && data.categories.find(c=>c.id===catId)?.color) || "#2f5eff";
    const picker = document.getElementById("categoryColorPicker");
    const text = document.getElementById("categoryColorText");
    document.getElementById("categoryColorError").textContent = "";

    if(isValidHex(currentColor)){
      picker.value = normalizeHex(currentColor);
      text.value = currentColor;
    }else if(isValidRgb(currentColor)){
      picker.value = rgbStringToHex(currentColor) || "#2f5eff";
      text.value = currentColor;
    }else{
      picker.value = "#2f5eff";
      text.value = currentColor;
    }

    document.getElementById("categoryModalOverlay").classList.add("show");
    nameInput.focus();
  }

  function closeCategoryModal(){
    document.getElementById("categoryModalOverlay").classList.remove("show");
    editingCategoryId = null;
  }

  function saveCategoryFromModal(){
    const name = document.getElementById("categoryNameInput").value.trim();
    if(!name){ showToast("Please enter a category name"); return; }

    const rawColor = document.getElementById("categoryColorText").value.trim();
    const errorEl = document.getElementById("categoryColorError");
    let color;
    if(isValidHex(rawColor)){
      color = normalizeHex(rawColor);
    }else if(isValidRgb(rawColor)){
      color = rawColor;
    }else{
      errorEl.textContent = "Enter a valid color, e.g. #2f5eff or rgb(47,94,255)";
      return;
    }
    errorEl.textContent = "";

    if(editingCategoryId){
      const cat = data.categories.find(c=>c.id===editingCategoryId);
      if(cat){ cat.name = name; cat.color = color; }
      showToast("Category updated");
    }else{
      data.categories.push({ id: uid("cat"), name, color, links: [] });
      showToast("Category added");
    }
    saveData();
    render();
    closeCategoryModal();
  }

  let pendingConfirmAction = null;

  function askConfirm(title, body, onConfirm){
    document.getElementById("confirmModalTitle").textContent = title;
    document.getElementById("confirmModalBody").textContent = body;
    pendingConfirmAction = onConfirm;
    document.getElementById("confirmModalOverlay").classList.add("show");
  }

  function closeConfirmModal(){
    document.getElementById("confirmModalOverlay").classList.remove("show");
    pendingConfirmAction = null;
  }

  function deleteCategory(catId){
    const cat = data.categories.find(c=>c.id===catId);
    if(!cat) return;
    askConfirm(
      "Delete category?",
      `Delete "${cat.name}" and all ${cat.links.length} link(s) inside it? This can't be undone.`,
      ()=>{
        data.categories = data.categories.filter(c=>c.id!==catId);
        saveData();
        render();
        showToast("Category deleted");
      }
    );
  }

  function openLinkModal(mode, catId, linkId){
    linkModalMode = mode;
    editingLinkId = linkId || null;
    document.getElementById("linkModalTitle").textContent = mode === "edit" ? "Edit link" : "Add link";

    const select = document.getElementById("linkCategorySelect");
    select.innerHTML = "";
    data.categories.forEach(c=>{
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.name;
      select.appendChild(opt);
    });
    select.value = catId;

    if(mode === "edit"){
      const cat = data.categories.find(c=>c.id===catId);
      const link = cat ? cat.links.find(l=>l.id===linkId) : null;
      document.getElementById("linkTitleInput").value = link ? link.title : "";
      document.getElementById("linkUrlInput").value = link ? link.url : "";
    }else{
      document.getElementById("linkTitleInput").value = "";
      document.getElementById("linkUrlInput").value = "";
    }

    document.getElementById("linkModalOverlay").classList.add("show");
    document.getElementById("linkTitleInput").focus();
  }

  function closeLinkModal(){
    document.getElementById("linkModalOverlay").classList.remove("show");
    editingLinkId = null;
  }

  function normalizeUrl(url){
    url = url.trim();
    if(!/^https?:\/\//i.test(url)) url = "https://" + url;
    return url;
  }

  function saveLinkFromModal(){
    const catId = document.getElementById("linkCategorySelect").value;
    const title = document.getElementById("linkTitleInput").value.trim();
    let url = document.getElementById("linkUrlInput").value.trim();
    if(!title || !url){ showToast("Please fill in both title and URL"); return; }
    url = normalizeUrl(url);

    const targetCat = data.categories.find(c=>c.id===catId);
    if(!targetCat) return;

    if(linkModalMode === "edit" && editingLinkId){
      data.categories.forEach(c=>{
        c.links = c.links.filter(l=> l.id !== editingLinkId);
      });
      targetCat.links.push({ id: editingLinkId, title, url });
      showToast("Link updated");
    }else{
      targetCat.links.push({ id: uid("l"), title, url });
      showToast("Link added");
    }
    saveData();
    render();
    closeLinkModal();
  }

  function deleteLink(catId, linkId){
    const cat = data.categories.find(c=>c.id===catId);
    if(!cat) return;
    const link = cat.links.find(l=>l.id===linkId);
    if(!link) return;
    askConfirm(
      "Delete link?",
      `Delete "${link.title}"? This can't be undone.`,
      ()=>{
        cat.links = cat.links.filter(l=>l.id!==linkId);
        saveData();
        render();
        showToast("Link deleted");
      }
    );
  }

  function setEditMode(on){
    editMode = on;
    document.getElementById("editModeToggleTop").classList.toggle("on", on);
    document.getElementById("editModeToggleTop").textContent = on ? "✅ Editing" : "🖉 Edit mode";
    renderCategories(document.getElementById("searchInput").value);
  }

  function setTheme(theme){
    document.body.setAttribute("data-theme", theme);
    localStorage.setItem(THEME_KEY, theme);
  }

  function loadTheme(){
    const saved = localStorage.getItem(THEME_KEY);
    setTheme(saved === "dark" ? "dark" : "light");
  }

  const CURATED_TIMEZONES = [
    { tz: "UTC", label: "UTC" },
    { tz: "Pacific/Honolulu", label: "Hawaii (UTC-10)" },
    { tz: "America/Anchorage", label: "Alaska (UTC-9)" },
    { tz: "America/Los_Angeles", label: "Los Angeles / Pacific (UTC-8/-7)" },
    { tz: "America/Denver", label: "Denver / Mountain (UTC-7/-6)" },
    { tz: "America/Chicago", label: "Chicago / Central (UTC-6/-5)" },
    { tz: "America/New_York", label: "New York / Eastern (UTC-5/-4)" },
    { tz: "America/Sao_Paulo", label: "São Paulo (UTC-3)" },
    { tz: "Europe/London", label: "London (UTC+0/+1)" },
    { tz: "Europe/Paris", label: "Paris / Berlin / Madrid (UTC+1/+2)" },
    { tz: "Africa/Lagos", label: "Lagos / West Africa (UTC+1)" },
    { tz: "Europe/Athens", label: "Athens / Helsinki (UTC+2/+3)" },
    { tz: "Africa/Cairo", label: "Cairo (UTC+2)" },
    { tz: "Europe/Moscow", label: "Moscow (UTC+3)" },
    { tz: "Asia/Dubai", label: "Dubai (UTC+4)" },
    { tz: "Asia/Karachi", label: "Karachi (UTC+5)" },
    { tz: "Asia/Kolkata", label: "India (UTC+5:30)" },
    { tz: "Asia/Dhaka", label: "Dhaka (UTC+6)" },
    { tz: "Asia/Bangkok", label: "Bangkok / Jakarta (UTC+7)" },
    { tz: "Asia/Shanghai", label: "China / Singapore (UTC+8)" },
    { tz: "Asia/Tokyo", label: "Tokyo / Seoul (UTC+9)" },
    { tz: "Australia/Sydney", label: "Sydney (UTC+10/+11)" },
    { tz: "Pacific/Auckland", label: "Auckland (UTC+12/+13)" }
  ];

  function getTimezoneList(){
    return CURATED_TIMEZONES;
  }

  function offsetMinutesFor(tz){
    try{
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false,
        timeZoneName: "shortOffset"
      }).formatToParts(now);
      const tzPart = parts.find(p=>p.type === "timeZoneName");
      if(!tzPart) return null;
      const m = tzPart.value.match(/GMT([+-]\d{1,2})(?::?(\d{2}))?/);
      if(!m) return 0;
      const sign = m[1].startsWith("-") ? -1 : 1;
      const hours = Math.abs(parseInt(m[1],10));
      const mins = m[2] ? parseInt(m[2],10) : 0;
      return sign * (hours*60 + mins);
    }catch(e){ return null; }
  }

  function closestCuratedTimezone(browserTz){
    if(CURATED_TIMEZONES.some(z=>z.tz === browserTz)) return browserTz;
    const targetOffset = offsetMinutesFor(browserTz);
    if(targetOffset === null) return "UTC";
    let best = "UTC";
    let bestDiff = Infinity;
    CURATED_TIMEZONES.forEach(z=>{
      const off = offsetMinutesFor(z.tz);
      if(off === null) return;
      const diff = Math.abs(off - targetOffset);
      if(diff < bestDiff){ bestDiff = diff; best = z.tz; }
    });
    return best;
  }

  function getBrowserTimezone(){
    try{
      return Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
    }catch(e){ return "UTC"; }
  }

  function loadTimezone(){
    const saved = localStorage.getItem(TIMEZONE_KEY);
    if(saved) return saved;
    return closestCuratedTimezone(getBrowserTimezone());
  }

  function saveTimezone(tz){
    localStorage.setItem(TIMEZONE_KEY, tz);
  }

  function populateTimezoneSelect(){
    const select = document.getElementById("tzSelect");
    const zones = getTimezoneList();
    const current = loadTimezone();
    select.innerHTML = "";
    zones.forEach(z=>{
      const opt = document.createElement("option");
      opt.value = z.tz;
      opt.textContent = z.label;
      select.appendChild(opt);
    });
    if(!zones.some(z=>z.tz === current)){
      const opt = document.createElement("option");
      opt.value = current;
      opt.textContent = current.replace(/_/g, " ");
      select.appendChild(opt);
    }
    select.value = current;
  }

  function pad(n){ return n.toString().padStart(2,"0"); }

  function updateClock(){
    const tz = loadTimezone();
    const now = new Date();
    try{
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: tz, year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      }).formatToParts(now);
      const map = {};
      parts.forEach(p=> map[p.type] = p.value);
      document.getElementById("clockDate").textContent = `${map.day}-${map.month}-${map.year}`;
      document.getElementById("clockTime").textContent = `${map.hour}:${map.minute}:${map.second}`;
    }catch(e){
      document.getElementById("clockDate").textContent =
        `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()}`;
      document.getElementById("clockTime").textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
  }

  function exportData(){
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "dashboard.json";
    a.click();
    URL.revokeObjectURL(a.href);
    showToast("Exported dashboard.json");
  }

  function importData(file){
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const parsed = JSON.parse(e.target.result);
        if(!parsed || !Array.isArray(parsed.categories)) throw new Error("Invalid format");
        data = parsed;
        saveData();
        render();
        showToast("Dashboard imported");
      }catch(err){
        showToast("Import failed — invalid file");
      }
    };
    reader.readAsText(file);
  }

  function closeMobileSidebar(){
    document.getElementById("sidebar").classList.remove("open");
  }


  function init(){
    loadTheme();
    render();
    populateTimezoneSelect();
    updateClock();
    setInterval(updateClock, 1000);

    document.getElementById("tzSelect").addEventListener("change", (e)=>{
      saveTimezone(e.target.value);
      updateClock();
    });

    document.getElementById("editModeToggleTop").addEventListener("click", ()=> setEditMode(!editMode));
    document.getElementById("editModeToggleSidebar").addEventListener("click", ()=> setEditMode(!editMode));

    document.getElementById("darkModeToggle").addEventListener("click", ()=>{
      const current = document.body.getAttribute("data-theme");
      setTheme(current === "dark" ? "light" : "dark");
    });

    document.getElementById("navAddCategoryBtn").addEventListener("click", ()=> openCategoryModal("add"));
    document.getElementById("addCategoryTileBtn").addEventListener("click", ()=> openCategoryModal("add"));
    document.getElementById("categoryCancelBtn").addEventListener("click", closeCategoryModal);
    document.getElementById("categorySaveBtn").addEventListener("click", saveCategoryFromModal);
    document.getElementById("categoryColorPicker").addEventListener("input", (e)=>{
      document.getElementById("categoryColorText").value = e.target.value;
      document.getElementById("categoryColorError").textContent = "";
    });
    document.getElementById("categoryColorText").addEventListener("input", (e)=>{
      const val = e.target.value.trim();
      if(isValidHex(val)) document.getElementById("categoryColorPicker").value = normalizeHex(val);
      else if(isValidRgb(val)){
        const hex = rgbStringToHex(val);
        if(hex) document.getElementById("categoryColorPicker").value = hex;
      }
    });
    document.getElementById("categoryModalOverlay").addEventListener("click", (e)=>{
      if(e.target.id === "categoryModalOverlay") closeCategoryModal();
    });

    document.getElementById("linkCancelBtn").addEventListener("click", closeLinkModal);
    document.getElementById("linkSaveBtn").addEventListener("click", saveLinkFromModal);
    document.getElementById("linkModalOverlay").addEventListener("click", (e)=>{
      if(e.target.id === "linkModalOverlay") closeLinkModal();
    });

    document.getElementById("searchInput").addEventListener("input", (e)=>{
      renderCategories(e.target.value);
    });

    document.getElementById("exportBtn").addEventListener("click", exportData);
    document.getElementById("importBtn").addEventListener("click", ()=> document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", (e)=>{
      if(e.target.files[0]) importData(e.target.files[0]);
      e.target.value = "";
    });

    document.getElementById("confirmCancelBtn").addEventListener("click", closeConfirmModal);
    document.getElementById("confirmOkBtn").addEventListener("click", ()=>{
      const action = pendingConfirmAction;
      closeConfirmModal();
      if(action) action();
    });
    document.getElementById("confirmModalOverlay").addEventListener("click", (e)=>{
      if(e.target.id === "confirmModalOverlay") closeConfirmModal();
    });

    document.getElementById("menuToggle").addEventListener("click", ()=>{
      document.getElementById("sidebar").classList.toggle("open");
    });

    document.addEventListener("keydown", (e)=>{
      if(e.key === "/" && document.activeElement.tagName !== "INPUT"){
        e.preventDefault();
        document.getElementById("searchInput").focus();
      }
      if(e.key === "Escape"){
        closeCategoryModal();
        closeLinkModal();
        closeConfirmModal();
        const searchInput = document.getElementById("searchInput");
        if(document.activeElement === searchInput) searchInput.blur();
      }
    });
  }

  document.addEventListener("DOMContentLoaded", init);

  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("service-worker.js").catch(err=>{
        console.error("Service worker registration failed", err);
      });
    });
  }
})();
</script>
</body>
</html>
